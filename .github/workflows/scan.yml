name: LIVE TRADE Scan

on:
  # 평일 09:00~15:40, 30분 간격 (KST = UTC+9)
  # UTC 기준이므로 KST 09:00 = UTC 00:00
  schedule:
    - cron: '0,30 0-6 * * 1-5'
    - cron: '40 6 * * 1-5'

  # 수동 실행 (테스트용)
  workflow_dispatch:

  # 코드 변경 시 자동 실행
  push:
    branches: [main]
    paths:
      - 'scanner.py'
      - '.github/workflows/scan.yml'


jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # scores.json 자동 커밋 권한

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python scanner.py

      - name: Commit and push scores.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scores.json
          if git diff --staged --quiet; then
            echo "변경 없음, 스킵"
          else
            git commit -m "🤖 자동 스캔: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi